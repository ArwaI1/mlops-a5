name: ML Pipeline

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install mlflow dvc kagglehub pandas scikit-learn

      - name: Pull Data with DVC
        run: dvc pull || true 

      - name: Train PyTorch Model
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
          MOCK_ACCURACY: "0.90" 
        run: python train.py --epochs 1

      # THIS IS THE FIX: Zip the database before uploading!
      - name: Zip MLflow Database
        run: zip -r mlruns.zip mlruns/

      - name: Persist Data
        uses: actions/upload-artifact@v4
        with:
          name: ml-pipeline-data
          path: |
            model_info.txt
            mlruns.zip

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install MLflow
        run: pip install mlflow

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ml-pipeline-data
          path: .

      # THIS IS THE FIX: Unzip the database exactly as it was!
      - name: Unzip MLflow Database
        run: unzip -o mlruns.zip

      - name: Check Accuracy Threshold
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
        run: python check_threshold.py

      - name: Mock Docker Build
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"
          docker build --build-arg RUN_ID=$RUN_ID -t my-model-image .